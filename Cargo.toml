# M5.d: server integration tests, gated the same way as the unidb-server
# binary — `tests/server_common/mod.rs` is a shared helper module, not its
# own test binary (Cargo doesn't auto-discover files in tests/ subdirectories).
[[test]]
name = "server_crud"
path = "tests/server_crud.rs"
required-features = ["server"]

[[test]]
name = "server_sql"
path = "tests/server_sql.rs"
required-features = ["server"]

[[test]]
name = "server_cypher"
path = "tests/server_cypher.rs"
required-features = ["server"]

[[test]]
