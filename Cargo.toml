# Item 22, L2: correlation-id proof. Uses `tracing-subscriber`'s `json`
# feature (server-only) to capture and assert the app/slow-query/audit join.
[[test]]
name = "logs_correlation"
path = "tests/logs_correlation.rs"
required-features = ["server"]

# Item 31: storage HTTP routes integration tests (Phase D).
[[test]]
name = "storage_routes"
path = "tests/storage_routes.rs"
required-features = ["server"]

# Item 32: bulk-load HTTP API integration tests.
[[test]]
name = "server_bulk"
path = "tests/server_bulk.rs"
required-features = ["server"]
