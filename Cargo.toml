[package]
name = "unidb"
version = "0.1.0"
edition = "2021"

[dependencies]
memmap2 = "0.9"
crc32fast = "1.4"
zerocopy = { version = "0.7", features = ["derive"] }
thiserror = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
sqlparser = "0.62.0"
serde_json = "1.0.150"
serde = { version = "1.0.228", features = ["derive"] }
instant-distance = "0.6.1"

# M5: optional server (src/server/, src/bin/unidb-server.rs). All gated
# behind the `server` feature so a default `cargo build`/`cargo test` never
# pulls in an async runtime — "the engine stays sync" (CLAUDE.md) is
# literally true for the default embedded build, not just true when the
# feature happens to be off.
tokio = { version = "1.52", optional = true, features = ["sync", "rt", "macros"] }

[features]
server = ["dep:tokio"]

[dev-dependencies]
tempfile = "3"
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "load"
harness = false

[[bench]]
name = "vector"
harness = false

[[bench]]
name = "graph"
harness = false

[[bench]]
name = "queue"
harness = false
