# MinIO (dev) for the unidb-storage object-storage service (backlog item 23).
#
# Kept in its OWN compose file (not folded into docker-compose.yml) so the
# fair-fsync benchmark stack is untouched — `docker compose up` for benches must
# not also spin up MinIO.
#
# Usage:
#   docker compose -f docker/docker-compose.minio.yml up -d
#   export STORAGE_BACKEND=minio
#   export STORAGE_S3_ENDPOINT=http://localhost:9000
#   export STORAGE_ACCESS_KEY=minioadmin STORAGE_SECRET_KEY=minioadmin
#   export STORAGE_BUCKET=unidb
#   # the `createbucket` init container makes the `unidb` bucket for you.
#   cargo test -p unidb-storage        # live_store_round_trip_when_configured now runs
#
# Console: http://localhost:9001  (minioadmin / minioadmin)
name: unidb-storage-minio

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - minio-data:/data

  # One-shot: create the default `unidb` bucket the service expects, then exit.
  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/unidb &&
      echo 'bucket unidb ready';
      "

volumes:
  minio-data:
